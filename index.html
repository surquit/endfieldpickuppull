<!DOCTYPE html>
<html lang="zh-TW" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 🌟 防止瀏覽器自動翻譯干擾 React 渲染導致網頁崩潰白屏 -->
  <meta name="google" content="notranslate">
  
  <title>終末地卡池招募大廳</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 核心套件 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel 以在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useMemo, useEffect } = React;

    // --- 內建圖示 ---
    const ChevronRight = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>;
    const ChevronDown = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
    const Trash2 = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const Info = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
    const ArrowLeft = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
    const Play = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;

    // ==========================================
    // 🌟 卡池設定區 (BANNERS)
    // 您可以在這裡無限新增不同的活動卡池！
    // ==========================================
    const BANNERS = [
      {
        id: 'luoxi',
        type: '限定招募',
        title: '狼珀',
        up: '洛茜',
        removed: ['萊萬汀', '潔爾佩塔'], 
        image: './images/banner_luoxi.jpg', // 👈 請確認您 GitHub 上的圖片檔名是 banner_luoxi.jpg
        bgGradient: 'from-orange-400 to-yellow-200',
        borderColor: 'border-orange-500',
        textColor: 'text-orange-400'
      },
      {
        id: 'tangtang',
        type: '限定招募',
        title: '河流的女兒',
        up: '湯湯', 
        removed: ['萊萬汀', '潔爾佩塔', '洛茜'],
        image: './images/banner_tangtang.jpg', // 👈 湯湯的卡池 Banner 圖片
        bgGradient: 'from-cyan-400 to-blue-300',
        borderColor: 'border-cyan-500',
        textColor: 'text-cyan-400'
      }
    ];

    // --- 模擬資料與設定 ---
    const CHARACTERS = {
      '洛茜': 6, '湯湯': 6, '駿衛': 6, '別禮': 6, '艾爾黛拉': 6, '伊馮': 6, '萊萬汀': 6, '黎風': 6, '潔爾佩塔': 6, '餘燼': 6,
      '阿列什': 5, '大潘': 5, '晝雪': 5, '艾維文娜': 5, '賽希': 5, '弧光': 5, '狼衛': 5, '陳千語': 5, '佩麗卡': 5,
      '安塔爾': 4, '埃特拉': 4, '秋栗': 4, '卡契爾': 4, '螢石': 4
    };

    const OPERATORS = {
      6: Object.keys(CHARACTERS).filter(k => CHARACTERS[k] === 6),
      5: Object.keys(CHARACTERS).filter(k => CHARACTERS[k] === 5),
      4: Object.keys(CHARACTERS).filter(k => CHARACTERS[k] === 4),
    };

    const RARITY_COLORS = {
      6: { bg: 'bg-orange-50', text: 'text-orange-600', ring: 'ring-orange-500', glow: 'shadow-[0_0_15px_rgba(249,115,22,0.6)]' },
      5: { bg: 'bg-yellow-50', text: 'text-yellow-600', ring: 'ring-yellow-400', glow: 'shadow-[0_0_10px_rgba(250,204,21,0.5)]' },
      4: { bg: 'bg-purple-50', text: 'text-purple-600', ring: 'ring-purple-500', glow: 'shadow-sm' },
    };

    // --- 頭像組件 (已徹底修復，純淨讀取本地資料夾) ---
    const OperatorPortrait = ({ name, isUp, size = 'large' }) => {
      const rarity = CHARACTERS[name];
      const colors = RARITY_COLORS[rarity];
      
      const sizeClasses = size === 'large' 
        ? 'w-full h-full' 
        : 'w-[60px] h-[82px] md:w-[76px] md:h-[104px]';

      // 🌟 直接指向本地圖片
      const imgSrc = `./images/${name}.png`;
      const [imgFailed, setImgFailed] = useState(false); 

      // 當抽到的角色改變時，重置錯誤狀態，讓瀏覽器嘗試去抓新圖片
      useEffect(() => {
        setImgFailed(false); 
      }, [imgSrc]);

      return (
        <div className={`relative flex flex-col items-center justify-end ${sizeClasses} bg-gray-900 transform transition-transform hover:scale-105 overflow-hidden ring-2 ${isUp ? 'ring-red-500 ring-offset-1 ' + colors.glow : colors.ring + ' ' + colors.glow}`}>
          
          {!imgFailed ? (
            <img
              src={imgSrc}
              alt={name}
              onError={() => setImgFailed(true)} /* 只有真的抓不到檔案，才會啟動備用文字卡 */
              className="absolute inset-0 w-full h-full object-cover"
            />
          ) : (
            <div className={`absolute inset-0 flex flex-col items-center justify-center p-1 text-center break-all font-bold ${colors.bg} ${colors.text} text-[10px] md:text-sm`}>
              <span>{name}</span>
              <span className="text-yellow-500 text-[8px] md:text-[10px] mt-1 drop-shadow-sm">{'★'.repeat(rarity)}</span>
            </div>
          )}

          {isUp && (
            <div className="absolute top-0 right-0 bg-red-600 text-white text-[8px] md:text-[10px] px-1 md:px-1.5 py-0.5 font-black shadow-md z-20 rounded-bl leading-none">
              UP
            </div>
          )}

          <div className={`relative w-full text-center py-0.5 md:py-1 ${isUp ? 'bg-red-600' : 'bg-gray-900'} bg-opacity-90 text-white font-bold z-10 truncate px-0.5 md:px-1 text-[9px] md:text-xs lg:text-sm shadow-[0_-2px_10px_rgba(0,0,0,0.5)]`}>
            {name}
          </div>
        </div>
      );
    };

    // ==========================================
    // 🎮 抽卡介面元件 (Gacha Simulator)
    // ==========================================
    function GachaSimulator({ banner, onBack }) {
      const [showClearModal, setShowClearModal] = useState(false);
      const [showBackModal, setShowBackModal] = useState(false); 
      const [bannerImgFailed, setBannerImgFailed] = useState(false); 

      // 當切換卡池時，確保 Banner 圖片失敗狀態重置
      useEffect(() => {
        setBannerImgFailed(false);
      }, [banner]);

      const [pullHistory, setPullHistory] = useState([]); 
      const [currentPulls, setCurrentPulls] = useState([]); 
      
      const [pity80, setPity80] = useState(0); 
      const [pity120, setPity120] = useState(0); 
      const [pity10, setPity10] = useState(0);
      const [hasReceivedUp, setHasReceivedUp] = useState(false);

      const [expandedSections, setExpandedSections] = useState({ 6: true, 5: true, 4: false });

      const standard6Stars = useMemo(() => {
        return OPERATORS[6].filter(name => name !== banner.up && !banner.removed.includes(name));
      }, [banner]);

      const performPull = useCallback((currentPity80, currentPity120, currentPity10, currentHasReceivedUp) => {
        let isUpGuaranteed = !currentHasReceivedUp && (currentPity120 + 1) >= 120;
        let is6StarGuaranteed = (currentPity80 + 1) >= 80 || isUpGuaranteed;
        let is5StarGuaranteed = (currentPity10 + 1) >= 10 && !is6StarGuaranteed;

        let rate6 = 0.008; 
        if (currentPity80 + 1 >= 65) rate6 += (currentPity80 + 1 - 64) * 0.05;

        const roll = Math.random();
        let rarity = 4; 
        let name = '';
        let isUp = false;

        if (is6StarGuaranteed || roll < rate6) {
          rarity = 6;
          if (isUpGuaranteed || Math.random() < 0.5) {
            name = banner.up; 
            isUp = true;
          } else {
            name = standard6Stars[Math.floor(Math.random() * standard6Stars.length)];
          }
        } else if (is5StarGuaranteed || roll < rate6 + 0.08) {
          rarity = 5;
          name = OPERATORS[5][Math.floor(Math.random() * OPERATORS[5].length)];
        } else {
          rarity = 4;
          name = OPERATORS[4][Math.floor(Math.random() * OPERATORS[4].length)];
        }

        return { 
          name, rarity, isUp, newlyReceivedUp: isUp,
          newPity80: rarity === 6 ? 0 : currentPity80 + 1,
          newPity120: (rarity === 6 && isUp) ? 0 : currentPity120 + 1,
          newPity10: (rarity >= 5) ? 0 : currentPity10 + 1 
        };
      }, [banner, standard6Stars]);

      const handlePull = useCallback((times) => {
        let temp80 = pity80, temp120 = pity120, temp10 = pity10;
        let tempHasReceivedUp = hasReceivedUp;
        const newPulls = [];

        for (let i = 0; i < times; i++) {
          const result = performPull(temp80, temp120, temp10, tempHasReceivedUp);
          newPulls.push({ ...result, id: Date.now() + i }); 
          temp80 = result.newPity80; 
          temp120 = result.newPity120; 
          temp10 = result.newPity10;
          if (result.newlyReceivedUp) {
            tempHasReceivedUp = true;
          }
        }

        setPity80(temp80); 
        setPity120(temp120); 
        setPity10(temp10);
        setHasReceivedUp(tempHasReceivedUp);
        setCurrentPulls(newPulls);
        setPullHistory(prev => [...prev, ...newPulls]);
      }, [pity80, pity120, pity10, hasReceivedUp, performPull]);

      const handleClear = useCallback(() => {
        setPullHistory([]); setCurrentPulls([]);
        setPity80(0); setPity120(0); setPity10(0);
        setHasReceivedUp(false);
        setShowClearModal(false);
      }, []);

      const handleBackToLobby = () => {
        if (pullHistory.length > 0) {
          setShowBackModal(true);
        } else {
          onBack();
        }
      };

      const totalPulls = pullHistory.length;
      const inventory = useMemo(() => {
        const inv = { 6: {}, 5: {}, 4: {} };
        pullHistory.forEach(p => {
          if (inv[p.rarity][p.name]) inv[p.rarity][p.name].count++;
          else inv[p.rarity][p.name] = { count: 1, isUp: p.isUp };
        });
        return inv;
      }, [pullHistory]);

      return (
        <div className="animate-fade-in-up">
          <div className="bg-gray-800 p-2 border-b border-gray-700 flex items-center">
            <button onClick={handleBackToLobby} className="flex items-center gap-1 text-gray-300 hover:text-white transition px-2 py-1 rounded hover:bg-gray-700">
              <ArrowLeft size={18} /> <span className="text-sm font-bold">返回大廳</span>
            </button>
            <span className="ml-auto text-gray-400 text-xs px-2">當前所在卡池：{banner.title}</span>
          </div>

          <div className={`relative w-full h-48 md:h-64 lg:h-80 bg-gray-900 overflow-hidden border-b-2 ${banner.borderColor} group`}>
            {!bannerImgFailed ? (
              <img 
                src={banner.image} 
                alt={`${banner.title} Banner`} 
                className="absolute inset-0 w-full h-full object-cover object-center"
                onError={() => setBannerImgFailed(true)}
              />
            ) : (
              <div className={`absolute inset-0 bg-gradient-to-r ${banner.bgGradient} flex flex-col justify-center p-6 md:p-8 opacity-90`}>
                <span className="text-gray-900 font-bold tracking-widest text-sm mb-1">{banner.type}</span>
                <h1 className="text-3xl md:text-5xl font-black text-gray-900 italic tracking-wider mb-2 drop-shadow-sm">{banner.title}</h1>
                <p className="text-gray-800 text-lg md:text-xl font-medium tracking-widest mb-4">限定 UP 幹員：<span className="font-bold text-gray-900 text-2xl">{banner.up}</span></p>
              </div>
            )}
            
            <div className={`absolute bottom-3 left-3 md:bottom-6 md:left-6 bg-black bg-opacity-75 p-2 md:p-3 rounded border-l-4 ${banner.borderColor} max-w-sm backdrop-blur-sm shadow-xl z-10`}>
              <p className="text-gray-200 text-xs md:text-sm leading-relaxed">
                <span className={`${banner.textColor} font-bold`}>首次 120 抽必出 UP！</span> 80抽必定獲得 6★<br/>第65抽起 6★ 機率逐步提升<br/>
                {banner.removed.length > 0 && (
                  <span className="text-gray-400 mt-1 block text-[10px] md:text-xs">(註：{banner.removed.join('、')}已移出本尋訪池)</span>
                )}
              </p>
            </div>
          </div>

          <div className="w-full bg-[#1e2024] min-h-[170px] p-2 md:p-4 flex items-center justify-center border-b-4 border-gray-700 shadow-inner">
            {currentPulls.length === 0 ? (
              <p className="text-gray-500 text-lg font-medium flex items-center gap-2">
                <Info size={20} /> 點擊下方按鈕進行尋訪
              </p>
            ) : (
              <div className="flex flex-nowrap justify-center items-center gap-1 sm:gap-2 py-4 w-full px-1 max-w-5xl mx-auto">
                {currentPulls.map((pull, idx) => (
                  <div key={pull.id} className="animate-fade-in-up flex-1 min-w-0 max-w-[65px] sm:max-w-[85px] md:max-w-[105px] aspect-[1/1.37]" style={{ animationDelay: `${idx * 0.05}s` }}>
                    <OperatorPortrait name={pull.name} isUp={pull.isUp} size="large" />
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="p-6 md:p-8">
            <div className="flex flex-wrap gap-4 mb-6">
              <button onClick={() => handlePull(1)} className="px-6 py-3 bg-white border-2 border-gray-300 text-gray-700 font-bold rounded hover:bg-gray-50 transition shadow-sm">
                尋訪 1 次
              </button>
              <button onClick={() => handlePull(10)} className="px-6 py-3 bg-gray-900 text-white font-bold rounded hover:bg-gray-800 transition shadow-md border-b-4 border-gray-700 active:border-b-0 active:translate-y-1">
                尋訪 10 次
              </button>
              <button onClick={() => setShowClearModal(true)} className="px-6 py-3 bg-[#c94b4b] text-white font-bold rounded hover:bg-red-700 transition shadow-sm flex items-center gap-2 ml-auto">
                <Trash2 size={18} />
                重置卡池
              </button>
            </div>

            <div className="mb-8 p-4 bg-gray-50 rounded-lg border border-gray-200 grid grid-cols-1 md:grid-cols-2 gap-4 text-sm md:text-base text-gray-700 shadow-inner">
              <div>
                <p className="mb-1 text-gray-500">總尋訪次數</p>
                <p className="text-2xl font-black text-gray-800">{totalPulls}</p>
              </div>
              <div className="space-y-2">
                <div className="flex justify-between items-center bg-white p-2 rounded border border-gray-100">
                  <span className="text-gray-600">距 <span className="font-bold text-orange-500">6★</span> 小保底剩餘：</span>
                  <span className={`font-black text-lg ${80 - pity80 <= 15 ? 'text-red-500' : 'text-gray-800'}`}>{80 - pity80} 抽</span>
                </div>
                
                <div className={`flex justify-between items-center p-2 rounded border ${hasReceivedUp ? 'bg-gray-100 border-gray-200' : 'bg-white ' + banner.borderColor}`}>
                  <span className={hasReceivedUp ? 'text-gray-400' : 'text-gray-600'}>
                    距 <span className={`font-bold ${hasReceivedUp ? 'text-gray-500' : banner.textColor}`}>UP {banner.up}</span> 大保底{hasReceivedUp ? '：' : '剩餘：'}
                  </span>
                  {hasReceivedUp ? (
                    <span className="font-bold text-sm text-gray-500 bg-gray-200 px-2 py-0.5 rounded">已達成</span>
                  ) : (
                    <span className="font-black text-lg text-red-600">{120 - pity120} 抽</span>
                  )}
                </div>
              </div>
            </div>

            <div className="space-y-4">
              <h3 className={`font-bold text-lg border-l-4 ${banner.borderColor} pl-2 mb-4`}>獲得幹員圖鑑</h3>
              {[6, 5, 4].map(rarity => {
                const count = Object.keys(inventory[rarity]).reduce((sum, key) => sum + inventory[rarity][key].count, 0);
                const isExpanded = expandedSections[rarity];
                const charList = Object.entries(inventory[rarity]).sort((a, b) => b[1].count - a[1].count);

                if (count === 0) return null;

                return (
                  <div key={rarity} className="border border-gray-200 rounded-lg overflow-hidden">
                    <button onClick={() => setExpandedSections(p => ({...p, [rarity]: !p[rarity]}))} className={`flex items-center w-full text-left py-3 px-4 transition ${RARITY_COLORS[rarity].bg} hover:brightness-95`}>
                      <span className={`mr-2 ${RARITY_COLORS[rarity].text}`}>{isExpanded ? <ChevronDown size={20} /> : <ChevronRight size={20} />}</span>
                      <span className={`font-bold ${RARITY_COLORS[rarity].text}`}>{rarity}★ 幹員</span>
                      <span className="ml-auto text-sm font-medium bg-white px-3 py-1 rounded-full shadow-sm text-gray-600">共 {count} 名</span>
                    </button>
                    {isExpanded && (
                      <div className="p-4 bg-white">
                        <div className="flex flex-wrap gap-5">
                          {charList.map(([name, data]) => (
                            <div key={name} className="relative group">
                              <OperatorPortrait name={name} isUp={data.isUp} size="small" />
                              {data.count > 1 && (
                                <div className="absolute -top-2 -right-2 bg-gray-800 text-white text-xs font-bold px-2 py-0.5 rounded-full shadow-md border-2 border-white z-20">x{data.count}</div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {showClearModal && (
            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-lg shadow-xl max-w-sm w-full p-6 animate-fade-in-up">
                <h3 className="text-xl font-bold text-gray-800 mb-2">確認重置卡池？</h3>
                <p className="text-gray-600 mb-6 text-sm">確定要清空所有尋訪紀錄嗎？此操作無法復原，所有的抽卡次數與保底進度都會歸零。</p>
                <div className="flex justify-end gap-3">
                  <button onClick={() => setShowClearModal(false)} className="px-4 py-2 bg-gray-100 text-gray-700 font-bold rounded hover:bg-gray-200 transition">取消</button>
                  <button onClick={handleClear} className="px-4 py-2 bg-red-600 text-white font-bold rounded hover:bg-red-700 transition shadow-sm flex items-center gap-2">
                    <Trash2 size={16} /> 確定清空
                  </button>
                </div>
              </div>
            </div>
          )}

          {showBackModal && (
            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-lg shadow-xl max-w-sm w-full p-6 animate-fade-in-up">
                <h3 className="text-xl font-bold text-gray-800 mb-2">返回大廳？</h3>
                <p className="text-gray-600 mb-6 text-sm">返回大廳將會<span className="text-red-500 font-bold">清空</span>您在當前卡池的所有抽卡紀錄與保底進度。確定要離開嗎？</p>
                <div className="flex justify-end gap-3">
                  <button onClick={() => setShowBackModal(false)} className="px-4 py-2 bg-gray-100 text-gray-700 font-bold rounded hover:bg-gray-200 transition">留在這裡</button>
                  <button onClick={() => onBack()} className="px-4 py-2 bg-gray-900 text-white font-bold rounded hover:bg-black transition shadow-sm flex items-center gap-2">
                    <ArrowLeft size={16} /> 確定返回
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 🏠 大廳介面元件 (Lobby)
    // ==========================================
    function Lobby({ banners, onSelect }) {
      return (
        <div className="min-h-screen bg-gray-900 font-sans text-gray-100 selection:bg-orange-200 py-10 px-4 md:px-8">
          <div className="max-w-5xl mx-auto">
            <header className="mb-10 text-center animate-fade-in-up">
              <h1 className="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-200 italic tracking-wider mb-4 drop-shadow-lg">
                招募中心
              </h1>
              <p className="text-gray-400 text-sm md:text-base">選擇您想進行模擬尋訪的活動卡池</p>
            </header>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
              {banners.map((banner, idx) => (
                <div 
                  key={banner.id} 
                  onClick={() => onSelect(banner.id)}
                  className="bg-gray-800 rounded-xl overflow-hidden shadow-2xl border border-gray-700 cursor-pointer transform transition-all duration-300 hover:-translate-y-2 hover:shadow-orange-500/20 hover:border-gray-500 group animate-fade-in-up"
                  style={{ animationDelay: `${idx * 0.1}s` }}
                >
                  <div className="relative h-40 md:h-52 overflow-hidden bg-gray-700">
                    <img 
                      src={banner.image} 
                      alt={banner.title} 
                      className="absolute inset-0 w-full h-full object-cover object-center transition-transform duration-700 group-hover:scale-110"
                      onError={(e) => {
                        e.target.style.display = 'none';
                        e.target.nextSibling.style.display = 'flex';
                      }}
                    />
                    <div className={`hidden absolute inset-0 bg-gradient-to-br ${banner.bgGradient} opacity-80 flex-col items-center justify-center`}>
                      <span className="font-black text-2xl text-gray-900 drop-shadow-md">{banner.title}</span>
                    </div>
                  </div>
                  
                  <div className="p-5 relative">
                    <div className={`absolute top-0 right-5 -translate-y-1/2 bg-gray-900 border-2 ${banner.borderColor} text-white px-4 py-1 rounded-full font-bold text-sm shadow-lg flex items-center gap-1`}>
                      <Play size={14} className={banner.textColor} /> 進入卡池
                    </div>
                    <span className="text-xs font-bold text-gray-400 bg-gray-700 px-2 py-1 rounded mb-2 inline-block">
                      {banner.type}
                    </span>
                    <h2 className="text-2xl font-bold text-white mb-1 group-hover:text-orange-400 transition-colors">{banner.title}</h2>
                    <p className="text-gray-300 text-sm">限定 UP 幹員：<span className={`font-bold ${banner.textColor} text-base`}>{banner.up}</span></p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 🌐 主應用程式 (切換路由器)
    // ==========================================
    function App() {
      const [activeBannerId, setActiveBannerId] = useState(null);

      const activeBanner = useMemo(() => {
        return BANNERS.find(b => b.id === activeBannerId);
      }, [activeBannerId]);

      if (!activeBanner) {
        return <Lobby banners={BANNERS} onSelect={setActiveBannerId} />;
      }

      return <GachaSimulator banner={activeBanner} onBack={() => setActiveBannerId(null)} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
